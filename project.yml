name: PromptHub
options:
  bundleIdPrefix: com.ranax.prompthub
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  PromptHub:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: PromptHubIcon.icon
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: PromptHubIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.ranax.prompthub
        PRODUCT_NAME: PromptHub
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "12"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Resources/PromptHub.entitlements
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
